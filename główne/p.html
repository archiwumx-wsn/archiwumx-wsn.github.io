<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ㅤ</title>

<style>
body {
    margin: 0;
    background: #0a0f1a;
    color: #d6e4ff;
    font-family: "Courier New", monospace;
    overflow: hidden;
}

#container {
    padding: 60px;
    max-width: 900px;
    margin: auto;
    font-size: 18px;
    line-height: 1.8;
    white-space: pre-wrap;
}

.cursor {
    display: inline-block;
    width: 10px;
    background: #d6e4ff;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}

#loginBox {
    display: none;
    margin-top: 40px;
    padding: 30px;
    border: 1px solid #2c3e66;
    background: rgba(10,15,30,0.8);
}

input {
    background: transparent;
    border: 1px solid #3f5c99;
    padding: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 3px;
    text-align: center;
    width: 150px;
}

button {
    margin-top: 15px;
    padding: 8px 20px;
    background: #1b2b50;
    border: 1px solid #3f5c99;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #243a6b;
}

#error {
    color: #ff4d4d;
    margin-top: 10px;
}
</style>
</head>
<body>

<div id="container"></div>

<div id="loginBox">
    <h3>Kod Dostępu</h3>
    <input type="password" id="codeInput" maxlength="5">
    <br>
    <button onclick="checkCode()">Zatwierdź</button>
    <div id="error"></div>
</div>

<script>
const text = `Ciepło przyszło za wcześnie.

Minęło kilka miesięcy od początku roku — dokładnie tyle, by człowiek zdążył zapomnieć o noworocznych obietnicach. W archiwum znów zapaliło się światło. To było pierwsze miejsce, do którego zawsze się wracało. Początek. Punkt wyjścia.

Na biurku leżała kartka.

„Zaczynaj tam, gdzie wszystko się zaczęło.”

Nikt jej nie podpisał.

Tego samego wieczoru pojawił się kontakt.

Nie telefon. Nie wiadomość.
Miś ubrany w żółtą kurtkę.

Siedział spokojnie na metalowym biurku w pokoju przesłuchań, jakby należał tam od lat. Patrzył szklanymi oczami i mówił cicho, niemal szeptem.

— Lubię różne rzeczy — powiedział. — Potrafię je policzyć.

I liczył długo. Zastanawiał się chwilę przy każdej z nich, jakby nadawał im wagę. Gdy skończył, zapadła cisza. W pokoju zrobiło się ciemno wyliczył że lubi deszcz, wieczór, ciebie, zachód słońca, wodę, statki, jedzenie, ciebie i swoją kurtkę.

Następnego dnia pojawił się komunikat.

Dziewczyna stała pod uliczną lampą. Jej twarz przecinał cień, a w głosie było coś pomiędzy spokojem a ostrzeżeniem.

— Bohaterowie nie zawsze działają razem — powiedziała. — Czasem muszą się rozdzielić.

Zrobiła kilka kroków w jedną stronę, potem tyle samo w drugą. Jakby coś dzieliło przestrzeń dokładnie na pół. Jakby granica była niewidoczna, ale realna.

— Wtedy zaczyna się gra.

W archiwum było wiele biurek. Ustawione równo, symetrycznie, jakby nikt nigdy nie naruszył porządku. Segregatory tworzyły idealne linie. Wszystko na swoim miejscu.

Tej nocy coś jednak się nie zgadzało.

Dwa krzesła były odsunięte.

Nieznacznie.

Jakby ktoś wstał przed chwilą.
Albo właśnie wrócił.

Nikt tego nie skomentował.

Zapadła noc.

Dziewczyna wróciła, trzymając aparat.

— Muszę to udokumentować — powiedziała. — Inaczej nikt nie uwierzy.

Było zbyt ciemno, by cokolwiek dostrzec. Ściany zlewały się z cieniem, a korytarz wydawał się dłuższy niż zwykle.

— Wystarczy włączyć światło.

Klik.

Pierwszy błysk rozciął mrok.
Drugi odbił się w szybie.
Kolejne obrazy zaczęły układać się w sekwencję.

Ostatni kadr zatrzymał coś, czego wcześniej nie było widać.

Galeria ożyła.

A archiwum — jakby czekało, aż ktoś połączy wszystko w całość.

Bo to nie była opowieść.

To była instrukcja.
`;

const container = document.getElementById("container");
let i = 0;

function typeWriter() {
    if (i < text.length) {
        container.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 20);
    } else {
        document.getElementById("loginBox").style.display = "block";
    }
}

function checkCode() {
    const code = document.getElementById("codeInput").value;
    const error = document.getElementById("error");

    if (code === "59427") {
        window.location.href = "../assets/images/pamietnik.jpg"; 
        // TU wstaw ścieżkę do zdjęcia pamiętnika
    } else {
        error.innerText = "Nieprawidłowy kod.";
    }
}

typeWriter();
</script>

</body>
</html>
