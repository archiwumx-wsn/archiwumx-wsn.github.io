<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>WSN – Terminal Dostępu</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff66;
    font-family: "Courier New", monospace;
    body {
    margin: 0;
    background: #000;
    color: #00ff66;
    font-family: "Courier New", monospace;
    overflow-y: auto;   /* ZAMIANA */
}
}

.diary-img {
  width: 280px;
  cursor: pointer;
  transition: transform 0.4s ease;
}

.diary-img:hover {
  transform: scale(1.05);
}

.diary-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: 0.4s;
}

.diary-modal.active {
  opacity: 1;
  visibility: visible;
}

.diary-book {
  width: 600px;
  height: 400px;
  background: #f4ecd8;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.6s ease;
  padding: 40px;
  font-family: Georgia, serif;
  color: #222;
  position: relative;
}

.diary-modal.active .diary-book {
  transform: scaleX(1);
}

.diary-page {
  opacity: 0;
  transition: opacity 1s ease 0.6s;
}

.diary-modal.active .diary-page {
  opacity: 1;
}

.close-diary {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 26px;
  cursor: pointer;
}

#terminal {
    padding: 40px;
    white-space: pre-wrap;
    font-size: 16px;
}

.input-line {
    display: flex;
    align-items: center;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #00ff66;
    font-family: inherit;
    font-size: 16px;
    width: 200px;
}

.glitch {
    animation: glitch 0.2s infinite;
}

.locked {
    background: #200000;
    color: red;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red; }
    50% { text-shadow: -2px 0 blue; }
    100% { text-shadow: 2px 0 red; }
}

.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");
const poprawnyKod = "59142";
let proby = 0;
let blokada = false;
document.body.classList.add("locked");

function typeText(text, delay = 30) {
    return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
            terminal.innerHTML += text[i];
terminal.scrollTop = terminal.scrollHeight;
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                resolve();
            }
        }, delay);
    });
}

async function startTerminal() {
    await typeText("WSN SYSTEM OPERACYJNY v4.2\n");
    await typeText("Autoryzacja dostępu do ARCHIWUM...\n");
    await typeText("Wprowadź 5-cyfrowy kod dostępu.\n\n");
    createInput();
}

function createInput() {
    const line = document.createElement("div");
    line.className = "input-line";
    line.innerHTML = "> ";

    const input = document.createElement("input");
    input.maxLength = 5;
    input.autofocus = true;

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            sprawdzKod(input.value);
        }
    });

    line.appendChild(input);
    terminal.appendChild(line);
    input.focus();
}

function sprawdzKod(kod) {
    if (blokada) return;

    terminal.innerHTML += "\nWeryfikacja...\n";

    if (kod === poprawnyKod) {
        terminal.innerHTML += "DOSTĘP PRZYZNANY.\n";
        setTimeout(() => {
            window.location.href = "dostep-archiwum.html";
        }, 1500);
    } else {
        proby++;
        terminal.innerHTML += "BŁĄD. KOD NIEPRAWIDŁOWY.\n";

        document.body.classList.add("glitch");
        setTimeout(() => {
            document.body.classList.remove("glitch");
        }, 400);

        if (proby >= 3) {
    blokada = true;
    terminal.innerHTML += "\nSYSTEM ZABLOKOWANY.\n";
    terminal.innerHTML += "Zgłoszono próbę nieautoryzowanego dostępu.\n";
    terminal.innerHTML += "Przekierowanie do strony głównej...\n";

    setTimeout(() => {
        window.location.href = "../index.html";
    }, 3000);
}
        } else {
            createInput();
        }
    }
}

startTerminal();
</script>

<!-- Pamiętnik -->
<img src="img/pamietnik.jpg" id="diaryTrigger" class="diary-img">

<!-- Fragment pamiętnika -->
<div id="diaryModal" class="diary-modal">
  <div class="diary-book">
    <span class="close-diary">&times;</span>

    <div class="diary-page">
      <h2>Dziennik – Fragment</h2>
      <p id="diaryText"></p>
    </div>

  </div>
</div>

<script>
const diaryTrigger = document.getElementById("diaryTrigger");
const diaryModal = document.getElementById("diaryModal");
const closeDiary = document.querySelector(".close-diary");
const diaryText = document.getElementById("diaryText");

const fragment = `
Ciepły miesiąc. Pięć miesięcy po Nowym Roku.
Dziś odezwał się Miś.

— Lubię 9 rzeczy — powiedział.
1. Ciszę.
2. Światło.
3. Tajemnice.
4. Numer 5.
5. Odwagę.
6. Zespół.
7. Bohaterów.
8. Galerię wspomnień.
9. Jedną osobę.

A potem pojawiła się dziewczyna.
Mówiła o super bohaterach,
jakby ekipa rozdzieliła się na pół.

Jest noc.
Ale wystarczy włączyć światło.
`;

function typeDiary(text, speed = 25) {
  diaryText.innerHTML = "";
  let i = 0;
  const interval = setInterval(() => {
    diaryText.innerHTML += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, speed);
}

diaryTrigger.addEventListener("click", () => {
  diaryModal.classList.add("active");
  setTimeout(() => {
    typeDiary(fragment);
  }, 700);
});

closeDiary.addEventListener("click", () => {
  diaryModal.classList.remove("active");
});

diaryModal.addEventListener("click", (e) => {
  if (e.target === diaryModal) {
    diaryModal.classList.remove("active");
  }
});
</script>

</body>
</html>
